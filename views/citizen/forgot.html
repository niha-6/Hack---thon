<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa | Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/base.css">
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
        <div class="glass-box p-5" style="max-width:420px; width:100%;">
            <div class="text-center mb-4">
                <div style="font-size:2.5rem;">🔐</div>
                <h4 class="fw-bold text-white mt-2">Forgot Password</h4>
                <p class="text-muted small">Enter your email and we'll send you a reset link.</p>
            </div>

            <div id="successMsg" class="alert alert-success d-none">
                ✅ Reset email sent! Check your inbox.
            </div>
            <div id="errorMsg" class="alert alert-danger d-none"></div>

            <input type="email" id="resetEmail" class="form-control mb-3" placeholder="Enter your email" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white;">
            
            <button id="resetBtn" class="btn-gold w-100">Send Reset Link</button>

            <div class="text-center mt-3">
                <a href="login.html" class="text-muted small">← Back to Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from "../../js/core/firebase-config.js";
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        document.getElementById("resetBtn").addEventListener("click", async () => {
            const email = document.getElementById("resetEmail").value.trim();
            const successMsg = document.getElementById("successMsg");
            const errorMsg = document.getElementById("errorMsg");
            const btn = document.getElementById("resetBtn");

            successMsg.classList.add("d-none");
            errorMsg.classList.add("d-none");

            if (!email) {
                errorMsg.textContent = "Please enter your email.";
                errorMsg.classList.remove("d-none");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Sending...";

            try {
                await sendPasswordResetEmail(auth, email);
                successMsg.classList.remove("d-none");
                btn.textContent = "Sent!";
            } catch (e) {
                errorMsg.textContent = e.message;
                errorMsg.classList.remove("d-none");
                btn.disabled = false;
                btn.textContent = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
